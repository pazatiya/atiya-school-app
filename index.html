<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>ATIYA ACADEMY</title>
<meta name="theme-color" content="#7c3aed"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ATIYA"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',sans-serif;background:#FFF8F0;min-height:100vh;overflow-x:hidden}
.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HOME */
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.25rem;gap:1.5rem;position:relative;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.3;pointer-events:none}
.blob1{width:350px;height:350px;background:#FFD54F;top:-100px;right:-80px}
.blob2{width:300px;height:300px;background:#FF8A65;bottom:-80px;left:-80px}
.home-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#FF7043,#FF8A65);display:flex;align-items:center;justify-content:center;font-size:2.5rem;box-shadow:0 12px 40px rgba(255,112,67,.35);position:relative;z-index:1}
.home-title{font-size:2rem;font-weight:900;color:#2C2840;letter-spacing:-0.5px;position:relative;z-index:1}
.home-sub{font-size:.9rem;color:#9490A8;position:relative;z-index:1}
.teacher-cards{display:flex;flex-direction:column;gap:.875rem;width:100%;position:relative;z-index:1}
.teacher-card{display:flex;align-items:center;gap:1rem;background:white;border:2px solid #EDE8E0;border-radius:20px;padding:1rem 1.25rem;cursor:pointer;text-align:right;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(0,0,0,.05)}
.teacher-card:active{transform:scale(.97)}
.teacher-card.liran-card{border-color:#FFD0BC;background:linear-gradient(135deg,#fff,#FFF3EE)}
.teacher-card.adel-card{border-color:#C8B4F8;background:linear-gradient(135deg,#fff,#F5F0FF)}
.t-avatar{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.75rem;flex-shrink:0}
.liran-card .t-avatar{background:#FFF3EE}
.adel-card  .t-avatar{background:#F0EBFF}
.t-info{flex:1}
.t-badge{font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:20px;display:inline-block;margin-bottom:.25rem}
.liran-card .t-badge{background:#FFE8D6;color:#C0440E}
.adel-card  .t-badge{background:#EDE0FF;color:#6B21A8}
.t-name{font-size:1.1rem;font-weight:800;color:#2C2840}
.t-desc{font-size:.7rem;color:#9490A8;margin-top:2px}
.parent-btn{width:100%;background:white;border:2px solid #EDE8E0;border-radius:16px;padding:.875rem;font-family:'Rubik',sans-serif;font-size:.9rem;font-weight:600;color:#6B6B80;cursor:pointer;transition:background .15s;position:relative;z-index:1}
.parent-btn:active{background:#F5F0FF}

/* TOPBAR + NAV */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;background:white;border-bottom:1.5px solid #EDE8E0;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;font-family:'Rubik',sans-serif;font-size:.88rem;color:#9490A8;cursor:pointer;padding:.25rem .5rem;border-radius:8px}
.brand{font-size:.85rem;font-weight:800;color:#2C2840}
.screen{padding:.75rem;display:flex;flex-direction:column;gap:.6rem;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.bottom-nav{display:flex;background:white;border-top:1.5px solid #EDE8E0;padding:.5rem;gap:.25rem}
.nav-btn{flex:1;background:none;border:none;font-family:'Rubik',sans-serif;font-size:.72rem;font-weight:600;color:#9490A8;cursor:pointer;padding:.5rem .25rem;border-radius:10px;transition:all .15s}
.nav-btn.active{background:#FFF3EE;color:#FF7043}
.nav-btn.adel-active{background:#F0EBFF;color:#7C3AED}

/* CARDS */
.card{background:white;border-radius:18px;border:2px solid #EDE8E0;padding:.875rem 1rem}
.card-label{font-size:.65rem;font-weight:700;color:#9490A8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.subject-banner{border-radius:18px;padding:.875rem 1rem;color:white;display:flex;align-items:center;gap:.75rem}
.liran-banner{background:#FF7043}
.adel-banner{background:#9C6FDE}
.banner-icon{font-size:1.75rem}
.banner-info{flex:1}
.banner-title{font-size:.95rem;font-weight:700}
.banner-sub{font-size:.68rem;opacity:.8;margin-top:2px}
.banner-pill{background:rgba(255,255,255,.2);padding:.15rem .5rem;border-radius:10px;font-size:.7rem;font-weight:600;white-space:nowrap}

/* STARS */
.stars-row{background:#FFF8E1;border-radius:12px;padding:.5rem .875rem;display:flex;align-items:center;gap:.5rem;border:1.5px solid #FFE082}
.stars-lbl{font-size:.72rem;font-weight:700;color:#F4A100}
.stars-icons{display:flex;gap:3px;margin-right:auto}
.star{font-size:.95rem;display:inline-block;transition:all .35s}
.star.off{filter:grayscale(1) opacity(.3)}
.stars-total{font-size:.76rem;font-weight:700;color:#F4A100}

/* MEMORY + NOTES */
.memory-card{background:#F3EDFC;border-radius:14px;padding:.5rem .875rem;border:1.5px solid #D4B8F4}
.memory-lbl{font-size:.65rem;font-weight:700;color:#7C3AED;margin-bottom:3px}
.memory-txt{font-size:.72rem;color:#5B21B6;line-height:1.4}
.notes-hint{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:14px;padding:.5rem .875rem;font-size:.74rem;color:#92400E;line-height:1.4}

/* SCHEDULE */
.schedule{display:flex;gap:.35rem;overflow-x:auto;padding-bottom:2px}
.chip{flex-shrink:0;padding:.32rem .55rem;border-radius:10px;font-size:.66rem;font-weight:600;border:2px solid #EDE8E0;background:#FFF8F0;color:#9490A8;white-space:nowrap}
.chip.done{border-color:#2ECC71;background:#E8F8F0;color:#166534}
.chip.cur{border-color:#FF7043;background:#FFF3EE;color:#FF7043}
.chip.adel-cur{border-color:#9C6FDE;background:#F3EDFC;color:#9C6FDE}

/* CHAT */
.chat{display:flex;flex-direction:column;gap:.55rem;overflow-y:auto;max-height:34vh;padding:.1rem}
.msg{display:flex;align-items:flex-end;gap:.38rem;animation:msgIn .3s ease}
.msg.me{flex-direction:row-reverse}
.avatar{width:28px;height:28px;border-radius:9px;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#F3EDFC}
.avatar.me{background:#FFF3EE}
.bubble{max-width:80%;padding:.6rem .875rem;border-radius:14px;font-size:.88rem;line-height:1.6;white-space:pre-wrap}
.bubble.ai{background:white;border:2px solid #EDE8E0;border-bottom-right-radius:4px;color:#2C2840}
.bubble.me{background:#FF7043;color:white;border-bottom-left-radius:4px}
.bubble.adel-me{background:#9C6FDE}
.typing{padding:.6rem .875rem;background:white;border:2px solid #EDE8E0;border-radius:14px;border-bottom-right-radius:4px;display:flex;gap:5px;align-items:center}
.dot{width:7px;height:7px;background:#9C6FDE;border-radius:50%;display:inline-block;animation:dot 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* SPEAKING */
.speaking{display:flex;align-items:center;gap:.5rem;background:#F3EDFC;border:1.5px solid #9C6FDE;border-radius:12px;padding:.4rem .7rem;font-size:.74rem;color:#9C6FDE;font-weight:600}
.wave{display:flex;gap:3px;align-items:center}
.wbar{width:3px;border-radius:3px;background:#9C6FDE;display:inline-block;animation:wav 1s infinite}
.stop-spk{margin-right:auto;background:none;border:1.5px solid #9C6FDE;border-radius:8px;padding:.15rem .45rem;font-size:.68rem;cursor:pointer;color:#9C6FDE;font-family:'Rubik',sans-serif}

/* HOMEWORK */
.hw{background:#E8F8F0;border:2px solid #2ECC71;border-radius:16px;padding:.75rem 1rem}
.hw-lbl{font-size:.78rem;color:#166534;font-weight:700;margin-bottom:.3rem}
.hw-text{font-size:.86rem;line-height:1.5}
.hw-next{margin-top:.5rem;background:#9C6FDE;color:white;border:none;border-radius:10px;padding:.38rem .875rem;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Rubik',sans-serif}

/* IMAGE */
.img-wrap{background:white;border-radius:16px;overflow:hidden;border:2px solid #EDE8E0}
.img-wrap img{width:100%;display:block}
.img-btns{display:flex;gap:.5rem;padding:.65rem}
.img-send{flex:1;background:#9C6FDE;color:white;border:none;border-radius:10px;padding:.5rem;font-family:'Rubik',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.img-cancel{background:#F3EDFC;border:none;border-radius:10px;padding:.5rem .75rem;cursor:pointer;font-size:.8rem}

/* CAMERA */
.cam-wrap{background:#1a1a2e;border-radius:18px;overflow:hidden;position:relative}
.cam-wrap video{width:100%;display:block;border-radius:18px}
.cam-ctrl{display:flex;justify-content:center;gap:.75rem;padding:.75rem;background:rgba(0,0,0,.4);position:absolute;bottom:0;width:100%}
.cap-btn{background:white;border:4px solid #FF7043;width:56px;height:56px;border-radius:50%;cursor:pointer;font-size:20px}
.cam-cancel{background:rgba(255,255,255,.2);border:none;border-radius:12px;padding:.4rem .875rem;color:white;cursor:pointer;font-family:'Rubik',sans-serif;font-size:.8rem}

/* INPUT */
.input-area{background:white;border-radius:20px;padding:.875rem;border:2px solid #EDE8E0;display:flex;flex-direction:column;gap:.6rem}
.mic-row{display:flex;align-items:center;gap:.75rem}
.mic-btn{width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;font-size:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:#FFF3EE}
.mic-btn.on{background:#FF7043;color:white;animation:pulse 1.4s infinite}
.mic-info{flex:1}
.mic-main{font-size:.78rem;color:#9490A8}
.mic-main.on{color:#FF7043;font-weight:700}
.mic-sub{font-size:.66rem;color:#9490A8;margin-top:1px}
.icon-btn{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;cursor:pointer;border:none}
.cam-icon-btn{background:#E8F8F0;border:1.5px solid #2ECC71}
.upload-lbl{background:#FFF3EE;border:1.5px solid #FF7043;border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0}
.quick-btns{display:flex;gap:.35rem;flex-wrap:wrap}
.qbtn{padding:.26rem .55rem;border:1.5px solid #9C6FDE;border-radius:20px;background:#F3EDFC;color:#9C6FDE;font-family:'Rubik',sans-serif;font-size:.7rem;font-weight:500;cursor:pointer}
.text-row{display:flex;gap:.4rem}
.text-in{flex:1;padding:.52rem .875rem;border:1.5px solid #EDE8E0;border-radius:12px;font-family:'Rubik',sans-serif;font-size:.88rem;outline:none;background:#FFF8F0;color:#2C2840}
.send-btn{width:40px;height:40px;background:#FF7043;border:none;border-radius:11px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.adel-send{background:#9C6FDE}

/* SHABBAT */
.shabbat{display:flex;align-items:center;justify-content:center;min-height:60vh;padding:1rem}
.shabbat-card{background:white;border-radius:24px;padding:2rem;border:2px solid #FFE082;text-align:center;max-width:320px}
.shabbat-icon{font-size:3rem;margin-bottom:1rem}
.shabbat-title{font-size:1.2rem;font-weight:700;margin-bottom:.5rem}
.shabbat-text{font-size:.9rem;color:#9490A8;line-height:1.6;margin-bottom:1.25rem}
.shabbat-override{background:#FF7043;color:white;border:none;border-radius:12px;padding:.6rem 1.5rem;font-family:'Rubik',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}

/* PARENT */
.tabs{display:flex;gap:.35rem;overflow-x:auto;padding-bottom:2px}
.tab{flex-shrink:0;padding:.35rem .75rem;border-radius:20px;border:1.5px solid #EDE8E0;background:white;font-family:'Rubik',sans-serif;font-size:.74rem;font-weight:600;color:#9490A8;cursor:pointer}
.tab.active{background:#9C6FDE;color:white;border-color:#9C6FDE}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.stat-box{background:white;border:2px solid #EDE8E0;border-radius:14px;padding:.75rem;text-align:center}
.stat-num{font-size:1.5rem;font-weight:900;color:#9C6FDE}
.stat-lbl{font-size:.68rem;color:#9490A8;margin-top:2px}
.note-in{width:100%;padding:.6rem .875rem;border:1.5px solid #EDE8E0;border-radius:12px;font-family:'Rubik',sans-serif;font-size:.85rem;outline:none;background:#FFF8F0}
.note-add{margin-top:.4rem;background:#9C6FDE;color:white;border:none;border-radius:10px;padding:.4rem 1rem;font-family:'Rubik',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
.note-item{background:white;border:1.5px solid #EDE8E0;border-radius:10px;padding:.5rem .75rem;font-size:.82rem;color:#2C2840;margin-bottom:.35rem;display:flex;justify-content:space-between;align-items:center}
.note-del{background:none;border:none;color:#C4BFCF;cursor:pointer;font-size:.9rem}
.err-banner{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:12px;padding:.5rem .875rem;font-size:.78rem;color:#B91C1C;text-align:center}

/* ANIMATIONS */
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
@keyframes wav{0%,100%{height:6px}50%{height:16px}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,112,67,.4)}50%{box-shadow:0 0 0 12px rgba(255,112,67,0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
//  CONFIG — שרת Render שלנו בלבד, ללא keys
// ═══════════════════════════════════════════
const SERVER = "https://atiya-voice-server.onrender.com";

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const store  = (k,d) => { try{ return JSON.parse(localStorage.getItem(k))??d }catch{return d} };
const save   = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} };

function israelNow(){ return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Jerusalem"})); }
function isShabbat(){ return israelNow().getDay()===6; }
function isFridayPM(){ const n=israelNow(); return n.getDay()===5 && n.getHours()>=12; }
function currentHour(){ return israelNow().getHours(); }
function dayName(){ return ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"][israelNow().getDay()]; }
function timeGreet(name){
  const h=currentHour();
  if(h>=5&&h<12) return `בוקר אור ${name}! ☀️`;
  if(h>=12&&h<17) return `צהריים טובים ${name}! 🌞`;
  if(h>=17&&h<21) return `ערב טוב ${name}! 🌙`;
  return `לילה טוב ${name}! 🌟`;
}

const HOLIDAYS={
  2026:[{s:[4,1],e:[4,9],n:"פסח"},{s:[4,29],e:[4,30],n:"יום העצמאות"},{s:[5,22],e:[5,23],n:"שבועות"},{s:[9,10],e:[9,11],n:"ראש השנה"},{s:[9,19],e:[9,19],n:"יום כיפור"},{s:[9,24],e:[9,30],n:"סוכות"},{s:[12,14],e:[12,22],n:"חנוכה"}],
  2025:[{s:[4,13],e:[4,20],n:"פסח"},{s:[5,1],e:[5,2],n:"יום העצמאות"},{s:[6,1],e:[6,2],n:"שבועות"},{s:[9,22],e:[9,23],n:"ראש השנה"},{s:[10,1],e:[10,1],n:"יום כיפור"},{s:[10,6],e:[10,12],n:"סוכות"},{s:[12,14],e:[12,22],n:"חנוכה"}]
};
function currentHoliday(){
  const d=israelNow(),y=d.getFullYear(),mo=d.getMonth()+1,da=d.getDate();
  for(const h of (HOLIDAYS[y]||[])){
    if((mo>h.s[0]||(mo===h.s[0]&&da>=h.s[1]))&&(mo<h.e[0]||(mo===h.e[0]&&da<=h.e[1]))) return h.n;
  }
  return null;
}

// ═══════════════════════════════════════════
//  CURRICULUM
// ═══════════════════════════════════════════

const LIRAN_LESSONS = [
{id:"k1",s:"קודש",b:"",icon:"🤲",t:"מודה אני",content:`מודה אני לפניך מלך חי וקיים שהחזרת בי נשמתי בחמלה, רבה אמונתך.
נלמד: מה זה מודה אני, מתי אומרים, מילה מילה ומשמעות. למה מודים לה׳ בבוקר? כי ה׳ החזיר את הנשמה. הנשמה כמו מתנה שה׳ נותן כל בוקר מחדש. גם: נטילת ידיים — למה, איך, כמה פעמים.`},
{id:"k2",s:"קודש",b:"",icon:"🙏",t:"תפילת שחרית",content:`שחרית — 3 חלקים: פסוקי דזמרה (שירים לה׳), קריאת שמע (אמונה), עמידה (בקשות). נלמד: שמע ישראל ה׳ אלוקינו ה׳ אחד — מה זה אומר? ה׳ אחד — יש רק אלוקים אחד לכולם. ואהבת — איך אוהבים את ה׳: בכל לב, בכל נפש, בכל מאד.`},
{id:"k3",s:"קודש",b:"",icon:"📖",t:"פרשת בראשית",content:`ששת ימי הבריאה: יום א — אור וחושך. יום ב — שמים. יום ג — יבשה, ים, צמחים. יום ד — שמש, ירח, כוכבים. יום ה — דגים וציפורים. יום ו — חיות ואדם (אדם וחוה). יום ז — שבת, ה׳ נח. גן עדן: עץ הדעת, הנחש, החטא, הגירוש. מסר: כל העולם נברא בשביל האדם.`},
{id:"k4",s:"קודש",b:"",icon:"🕯️",t:"הלכות שבת",content:`שבת: מתי מתחילה (שקיעה שישי) ומתי נגמרת (צאת כוכבים שבת). הכנה: ניקיון הבית, בגדים יפים, אוכל מוכן מראש. הדלקת נרות: האמא מדליקה, מברכת, מכסה עיניים. קידוש: על היין, זכור את יום השבת. מה אסור: לכתוב, לצייר, להדליק אש, להשתמש בחשמל. מה מותר: לשחק, ללמוד, לטייל, לישון.`},
{id:"k5",s:"קודש",b:"",icon:"🍎",t:"ראש השנה",content:`ראש השנה — ראש השנה של העולם, ה׳ שופט כולם. תפוח בדבש: שתהיה שנה טובה ומתוקה. שופר: 3 קולות — תקיעה (שלם), שברים (3 חלקים), תרועה (9 חלקים). למה שופר? להעיר את הלב לחזרה בתשובה. תשליך: זורקים פירורים לנהר — שולחים עוונות. לשנה טובה תכתבו ותחתמו.`},
{id:"k6",s:"קודש",b:"",icon:"🌸",t:"פסח",content:`יציאת מצרים: יעקב ובניו ירדו למצרים, עבדים לפרעה, ה׳ שלח את משה. עשרת המכות: דם, צפרדע, כינים, ערוב, דבר, שחין, ברד, ארבה, חושך, מכת בכורות. קריעת ים סוף. הסדר: 15 מדרגות — קדש, ורחץ, כרפס, יחץ... ד׳ קושיות. מה נאכל: מצה (לא חמץ), מרור (מרירות העבדות), כרפס, חרוסת. ד׳ כוסות יין.`},
{id:"k7",s:"קודש",b:"",icon:"🕎",t:"חנוכה",content:`חנוכה: המכבים (יהודה המכבי) נלחמו ביוונים שרצו לבטל את היהדות. כיבשו בחזרה את בית המקדש. מצאו פך שמן אחד — נס! שמן ל-1 יום הספיק ל-8 ימים. לכן 8 ימי חנוכה. חנוכייה: מניחים בצד שמאל של הפתח או בחלון. מדליקים משמאל לימין. ברכות: להדליק, שעשה ניסים. הלל ומודים. אוכלים סופגניות ולביבות — בשמן.`},
{id:"e1",s:"עברית",b:"לקרא בנעם – קמץ־פתח",icon:"🔤",t:"אותיות א-ד + קמץ־פתח",content:`חוברת לקרא בנעם 1, שיעורים 1-4:
אות א (אלף): לא נשמעת, ניקוד משנה צליל. אַ = פתח, אָ = קמץ.
אות ב (בית): צליל "ב". בַּ בָּ.
אות ג (גימל): צליל "ג". גַּ גָּ.
אות ד (דלת): צליל "ד". דַּ דָּ.
תרגול: קריאת הברות — בַּ, גַּ, דַּ, אַ. מילים: בָּד, גַּד, דָּג.
ניקוד פתח: ( ַ ) = "א" קצר. ניקוד קמץ: ( ָ ) = "א" ארוך.`},
{id:"e2",s:"עברית",b:"לקרא בנעם – קמץ־פתח",icon:"🔡",t:"אותיות ה-ח + קמץ־פתח",content:`חוברת לקרא בנעם 1, שיעורים 5-8:
ה (הא): צליל "ה". הַ הָ.
ו (וו): צליל "ו". וַ וָ. גם שימוש כניקוד: שורוק (וּ), חולם (וֹ).
ז (זין): צליל "ז". זַ זָ.
ח (חית): צליל "ח" מהגרון.
תרגול: הַד, זָב, חַג, הֶם. משפטים: הַד הִכָּה. זָב דַּג.
מילים חדשות: אָב (אבא), אֵם (אמא), דָּג (דגים), בַּד (בד).`},
{id:"e3",s:"עברית",b:"לקרא בנעם – חולם / חיריק",icon:"💧",t:"ניקוד חולם, חיריק ושילוב צלילים",content:`חוברת לקרא בנעם 1, שיעורים 9-12:
חיריק ( ִ ) = "אִי": בִּי, גִּי, דִּי. מילים: בִּית, גִּיל, חִיל.
שורוק ( וּ ) = "אוּ": בּוּ, גּוּ. מילים: גּוּף, חוּב.
חולם ( וֹ ) = "אוֹ": בּוֹ, גּוֹ. מילים: אוֹר, בּוֹר, גּוֹב.
5 תנועות ושמותיהן: פתח, קמץ, חיריק, שורוק, חולם.
תרגול: קריאת מילים עם כל הניקוד. הבנה: מי זה? מה זה?`},
{id:"e4",s:"עברית",b:"לקרא בנעם – צירה־סגול",icon:"📝",t:"אותיות ט-מ + צירה־סגול",content:`חוברת לקרא בנעם 2, שיעורים 1-6:
ט (טית): צליל "ט". מילים: טַל, טוֹב, טִיט.
י (יוד): צליל "י". גם ניקוד: חיריק מלא (בִּי).
כ/ך (כף): צליל "כ" בתחילת מילה, "ך" בסוף.
ל (למד): צליל "ל". לַ לָ לִ לוּ לוֹ.
מ/ם (מם): "מ" בתחילה/אמצע, "ם" בסוף.
צירה ( ֵ ) = "אֵי": מֵי, כֵּן, לֵב. שוא נח ונע.
מילים: יַד, יֶלֶד, כֶּלֶב, לֶחֶם, מַיִם.`},
{id:"e5",s:"עברית",b:"לקרא בנעם – צירה־סגול",icon:"📖",t:"אותיות נ-ע + קריאת מילים",content:`חוברת לקרא בנעם 2, שיעורים 7-12:
נ/ן (נון): "נ" בתחילה/אמצע, "ן" בסוף.
ס (סמך): צליל "ס". סוּס, סַל.
ע (עין): צליל גרוני, כמו א אבל מהגרון. עַם, עֵץ, עִיר.
פ/ף (פא): "פ" בתחילה — צליל "פ". "ף" בסוף.
קריאת מילים: נַעַל, סֵפֶר, עֵפֶר, פִּיל.
קריאת משפט: הַיֶּלֶד אוֹכֵל לֶחֶם. הַנַּעֲרָה שָׁרָה שִׁיר.`},
{id:"e6",s:"עברית",b:"לקרא בנעם – שורוק־קובוץ (מסכמת)",icon:"✍️",t:"אותיות פ-ת + חוברת מסכמת",content:`חוברת לקרא בנעם 3, שיעורים 1-8:
צ/ץ (צדי): "צ" בתחילה, "ץ" בסוף. צִפּוֹר, חֵץ.
ק (קוף): צליל "ק". קוֹף, קֶסֶם.
ר (ריש): צליל "ר". רַגֶּל, רוּחַ.
ש (שין): צליל "ש". שֶׁמֶשׁ, שָׁלוֹם.
ת (תו): צליל "ת". תַּפּוּחַ, תּוֹרָה.
22 אותיות + 5 סופיות. דגש קל בבגד כפת. חזרה על כל הניקוד.
קריאת משפטים ארוכים.`},
{id:"e7",s:"עברית",b:"לקרא בנעם – שורוק־קובוץ (מסכמת)",icon:"📚",t:"קריאת קטע + הבנת הנקרא",content:`חוברת לקרא בנעם 4, שיעורים 1-10:
קריאה שוטפת של קטעים קצרים עם ניקוד מלא.
שאלות הבנה: מי? מה? איפה? מתי? למה? איך?
מציאת מילה בטקסט. ניחוש מילה מהקשר.
סדר אירועים: מה קרה קודם? אחר כך? בסוף?
מילים נרדפות פשוטות. הנגדות: גדול/קטן, חם/קר.
כתיבת משפט אחד על הקטע.`},
{id:"e8",s:"עברית",b:"לקרא בנעם – לימוד הכתב",icon:"🎯",t:"קריאה עצמאית + לימוד הכתב",content:`חוברת לקרא בנעם 5, שיעורים 1-12:
קריאה עצמאית שוטפת ללא עזרה.
כתיבה: מילים, משפטים, סיפור קצר (פתיחה+אמצע+סוף).
כתיבת אותיות בסיסית: גדולות וקטנות.
ניקוד עצמאי למילים פשוטות.
כתיבה יוצרת: "הבוקר שלי", "הסיפור האהוב עלי".
הכתבה: 5-8 מילים.`},
{id:"m1",s:"מתמטיקה",b:"שבילים חדשים 1",icon:"🔢",t:"מספרים 1-5",content:`חוברת שבילים 1, פרק א:
מספרים 1-5: זיהוי, כתיבה, ספירה. כמות לעומת מספר.
קבוצות: כמה חפצים בכל קבוצה? חיבור קבוצות.
סדר: ראשון, שני, שלישי, רביעי, חמישי.
גדול מ / קטן מ / שווה: 3 > 2, 1 < 4, 2 = 2.
קו מספרים 1-5. מי בא לפני? מי אחרי?
כתיבת מספרים: 1 (קו), 2 (עקום+קו), 3, 4, 5.`},
{id:"m2",s:"מתמטיקה",b:"שבילים חדשים 1",icon:"➕",t:"חיבור עד 5",content:`חוברת שבילים 1, פרק ב:
חיבור: כמה יש יחד? 2 תפוחים + 1 תפוח = 3 תפוחים.
סימן +. 1+1=2, 2+1=3, 1+2=3, 2+2=4, 2+3=5.
בעיות מילוליות: "היו 2 ילדים, הגיעו עוד 2. כמה יש?"
הוכחה עם אצבעות, ציורים, קוביות.
חלק חסר: 2+?=4. בגרסה ויזואלית: ○○+?=○○○○.
משפחת מספרים: 1+4, 4+1, 5-4, 5-1.`},
{id:"m3",s:"מתמטיקה",b:"שבילים חדשים 1",icon:"🔢",t:"מספרים 6-10",content:`חוברת שבילים 1, פרק ג:
מספרים 6-10: זיהוי, כתיבה, ספירה, כמות.
קו מספרים 1-10. דלוג על מספרים.
זוגי/אי-זוגי: 2,4,6,8,10 זוגי. 1,3,5,7,9 אי-זוגי.
כתיבת 6-10. 10 = עשר = שתי קבוצות של 5.
מה בין... מה אחרי... מה לפני...
בעיות: "היו 6 סוכריות, אכלת 2. כמה נשאר?"(חיסור בסיסי)`},
{id:"m4",s:"מתמטיקה",b:"שבילים חדשים 2",icon:"➕",t:"חיבור עד 10",content:`חוברת שבילים 2, פרק א:
חיבור עד 10: כל הצירופים. 6+4, 7+3, 8+2, 9+1, 5+5.
משפחות חיבור: 3+7=10, 7+3=10 (חילוף).
חלק חסר: 6+?=10. ?+4=9.
בעיות מילוליות 2 שלבים: "היו 4 ילדים. הגיעו 3. הלכו 2. כמה?"
חיבור עם קו מספרים: קופצים קדימה.
בעיות "ביחד": "כמה בסה"כ?"`},
{id:"m5",s:"מתמטיקה",b:"שבילים חדשים 2",icon:"➖",t:"חיסור עד 10",content:`חוברת שבילים 2, פרק ב:
חיסור: נשאר, הלך, אכל, שבר. 10-3=7, 8-5=3.
קשר חיבור-חיסור: 3+7=10, אז 10-7=3 ו-10-3=7.
חיסור עם קו מספרים: קופצים אחורה.
בעיות: "היו 9 ציפורים. עפו 4. כמה נשאר?"
חיסור כ"הפרש": "כמה יותר יש ל-א מ-ב?" 8-5=3.
תרגול מהיר: כרטיסי פלאש עד 10.`},
{id:"m6",s:"מתמטיקה",b:"שבילים חדשים 2",icon:"📐",t:"צורות גיאומטריות",content:`חוברת שבילים 2, פרק ג:
צורות שטוחות: עיגול (אין צלעות), ריבוע (4 צלעות שוות), משולש (3 צלעות), מלבן (4 צלעות, 2 ארוכות+2 קצרות).
זיהוי בסביבה: חלון=מלבן, גלגל=עיגול, כריך=משולש.
ספירת צלעות וזוויות.
צורות תלת-ממדיות: כדור, קובייה, גליל, חרוט.
סימטריה: קיפול — שני חצאים שווים.
יצירת צורות מקצבעות.`},
{id:"m7",s:"מתמטיקה",b:"שבילים חדשים 3",icon:"🔢",t:"מספרים 11-20",content:`חוברת שבילים 3, פרק א:
מספרים 11-20: עשרת ויחידות. 13 = עשרת אחת + 3 יחידות.
כתיבת 11-20 במספרים ובמילים: אחד-עשר, שניים-עשר...
קו מספרים 0-20. גדול/קטן בין מספרים דו-ספרתיים.
דלוג: 2,4,6...20. 5,10,15,20.
מה בין 13 ל-17? מה לפני 20?

{id:"m8",s:"מתמטיקה",b:"שבילים חדשים 3",icon:"➕",t:"חיבור עד 20",content:`חוברת שבילים 3, פרק ב:

שיטה: 8+5 = 8+2+3 = 10+3 = 13.

חיבור שלושה מספרים: 3+4+6=13.
חיסור עד 20: 15-7=8 (שיטת מעבר עשרת).`},
{id:"m9",s:"מתמטיקה",b:"שבילים חדשים 3",icon:"⚖️",t:"מדידה וזמן",content:`חוברת שבילים 3, פרק ג:
אורך: ארוך/קצר, גבוה/נמוך. מדידה בסרגל (ס"מ).

נפח: הרבה/מעט. כמה כוסות ממלאות בקבוק?
זמן: שעון שעות שלמות (בן שתים). שעות מוכרות: 7 בבוקר, 12 צהריים.
ימי השבוע: ראשון, שני...שישי, שבת. סדרם.
חודשים: ינואר עד דצמבר. עונות.`},
{id:"m10",s:"מתמטיקה",b:"שבילים חדשים 4",icon:"➖",t:"חיסור עד 20 + בעיות משולבות",content:`חוברת שבילים 4:

בעיות משולבות חיבור+חיסור.

השלמה: "?+6=15, אז 15-6=?"

חזרה על כל פרקי שבילים 1-4. מבדק.`},
{id:"sc1",s:"מדעים",b:"פלא טבע 1",icon:"🌱",t:"הצמח וחלקיו",content:`פלא טבע א׳, פרק 1:
חלקי הצמח: שורש (קולט מים ומינרלים, מחזיק), גבעול (מוביל מים, נושא), עלה (מכין מזון בשמש — פוטוסינתזה), פרח (רבייה), פרי (מגן על הזרע), זרע (צמח חדש).
פוטוסינתזה (פשוטה): עלה לוקח אור שמש + מים + אוויר → מכין סוכר = מזון לצמח.
ניסוי: צמח שגדל לכיוון האור.
שאלה לחשיבה: "למה עלים ירוקים?"(יש בהם כלורופיל)`},
{id:"sc2",s:"מדעים",b:"פלא טבע 2",icon:"🌞",t:"מה הצמח צריך לגדול",content:`פלא טבע א׳, פרק 2:
4 דברים שצמח צריך: אור שמש, מים, אוויר (CO2), קרקע (מינרלים).
ניסוי: 2 צמחים — אחד בחושך, אחד באור. מה קרה?
ניסוי: צמח בלי מים — מה קרה? נבלה.
גידול מהזרע: נביטה — זרע+מים+חום→ שורש קטן יוצא.
שמירה על צמחים: השקיה, אור, ניקוי עלים.
צמחים בבית לעומת בגינה — הבדלים.`},
{id:"sc3",s:"מדעים",b:"פלא טבע 1",icon:"🐛",t:"חרקים",content:`פלא טבע א׳, פרק 3:
חרק = 3 חלקים (ראש, חזה, בטן) + 6 רגליים + לרוב 2 זוגות כנפיים.
חרקים מוכרים: פרפר, דבורה, נמלה, חגב, חיפושית, גחלילית.
מחזור חיי פרפר: ביצה → זחל (קטרפיל) → גולם → פרפר.
דבורה: אוספת אבקה, עושה דבש, מאביקה פרחים. חשובה מאוד!
נמלה: חיה בקהילה, עובדת קשה, חזקה פי 50 ממשקלה.
חרקים מועילים ומזיקים.`},
{id:"sc4",s:"מדעים",b:"פלא טבע 1",icon:"🐟",t:"חיות ובית גידול",content:`פלא טבע א׳, פרק 4:
בתי גידול: ים/אגם, יבשה, אוויר, מדבר, יער.
חיות ים: דג, דולפין, צב ים, כריש. נושמות בעזרת זימים.
חיות יבשה: אריה, פיל, כלב, חתול. נושמות ריאות.
ציפורים: כנפיים, נוצות, מקור, ביצים. פנגווין לא עף!
חיות מדבר: גמל (דבשת=שומן), לטאה, עכבר מדבר.
שרשרת מזון פשוטה: עשב → ארנב → שועל.`},
{id:"sc5",s:"מדעים",b:"פלא טבע 1",icon:"☀️",t:"עונות השנה",content:`פלא טבע א׳, פרק 5:
4 עונות: אביב (מרץ-מאי), קיץ (יוני-אוגוסט), סתיו (ספטמבר-נובמבר), חורף (דצמבר-פברואר).
אביב: חם נעים, פרחים, ציפורים חוזרות, גשם לפעמים.

// ═══════════════════════════════════════════
//  AI CALL  →  SERVER /ai
// ═══════════════════════════════════════════
async function sendToAI(child, userText, imageBase64=null){
  const c = state[child];

  // Add to Gemini history
  const userPart = imageBase64
    ? { role:"user", parts:[{inline_data:{mime_type:"image/jpeg",data:imageBase64}},{text:userText||"תבדקי את העבודה שלי!"}] }
    : { role:"user", parts:[{text:userText}] };
  c.historyAI.push(userPart);

  try {
    const res = await fetch(`${SERVER}/ai`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        systemPrompt: buildSystemPrompt(child),
        history: c.historyAI.slice(-20),   // last 10 turns
        message: imageBase64 ? "תבדקי את העבודה שלי!" : userText
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    const aiText = data.text;
    c.historyAI.push({ role:"model", parts:[{text:aiText}] });

    return aiText;
  } catch(e){
    console.error("AI error:", e);
    throw e;
  }
}

// ═══════════════════════════════════════════
//  VOICE CALL  →  SERVER /voice
// ═══════════════════════════════════════════
async function speak(text){
  stopAudio();
  state.speaking = true;
  render();

  try {
    const res = await fetch(`${SERVER}/voice`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({text})
    });
    if(!res.ok) throw new Error("voice server error");

    const buf = await res.arrayBuffer();
    const blob = new Blob([buf], {type:"audio/mpeg"});
    const url  = URL.createObjectURL(blob);
    audioObj = new Audio(url);
    audioObj.onended = () => { URL.revokeObjectURL(url); audioObj=null; state.speaking=false; render(); };
    audioObj.onerror = () => { audioObj=null; state.speaking=false; render(); };
    audioObj.play().catch(()=>{ state.speaking=false; render(); });
  } catch(e){
    console.error("Voice error:", e);
    state.speaking = false;
    render();
  }
}

function stopAudio(){
  if(audioObj){ audioObj.pause(); audioObj=null; }
  state.speaking = false;
}

// ═══════════════════════════════════════════
//  LESSON FLOW
// ═══════════════════════════════════════════
function addMsg(child, role, text){
  state[child].messages.push({role, text, id: Date.now()+Math.random()});
}

function handleAIResponse(child, aiText){
  const c = state[child];

  if(aiText.includes("שיעורי בית:") && !c.hw){
    const parts = aiText.split("שיעורי בית:");
    if(parts[0].trim()) addMsg(child, "ai", parts[0].trim());
    c.hwText = parts[1]?.trim() || "";
    c.hw = true;

    // save memory
    const lesson = (child==="liran"?LIRAN_LESSONS:ADEL_LESSONS)[c.lessonIdx % (child==="liran"?LIRAN_LESSONS:ADEL_LESSONS).length];
    c.memory.push({ date: new Date().toLocaleDateString("he-IL"), lesson: lesson.t, summary: c.hwText.slice(0,60) });
    save(`${child}_memory`, c.memory);

    // stars + total
    c.stars = (c.stars||0) + 1;
    c.total = (c.total||0) + 1;
    save(`${child}_stars`, c.stars);
    save(`${child}_total`, c.total);
  } else {
    addMsg(child, "ai", aiText);
    // bonus star for praise
    if(/⭐|כל הכבוד|מצוין|נכון!|יפה מאוד/.test(aiText)){
      c.stars = (c.stars||0) + 1;
      save(`${child}_stars`, c.stars);
    }
  }
  render();
  speak(aiText.replace(/שיעורי בית:.*/s,"").trim() || aiText);
}

async function startLesson(child){
  const c = state[child];
  c.messages = [];
  c.hw = null;
  c.hwText = "";
  c.historyAI = [];
  state.typing = true;
  render();

  const hol = currentHoliday();
  const hour = currentHour();
  let startMsg = "התחילי את השיעור עכשיו לפי השעה";
  if(isShabbat())    startMsg = "שבת! ברכי שבת שלום ולמדי קודש מתאים לשבת";
  else if(isFridayPM()) startMsg = "ערב שבת! ברכי שבת שלום";
  else if(hol)          startMsg = `חג ${hol}! ברכי ולמדי על החג`;
  else if(hour>=6 && hour<=9) startMsg = "בוקר! ברכי, אמרי מודה אני ביחד, ואז התחילי ללמד";

  const mem = c.memory;
  if(mem.length) startMsg += `. שיעור קודם: ${mem[mem.length-1].lesson}.`;

  try {
    const aiText = await sendToAI(child, startMsg);
    state.typing = false;
    handleAIResponse(child, aiText);
  } catch(e){
    state.typing = false;
    state.lastError = "שגיאה בחיבור לשרת. בדקי חיבור לאינטרנט.";
    render();
  }
}

async function sendMessage(child, text, imageB64=null){
  if(!text.trim() && !imageB64) return;
  stopAudio();

  if(imageB64){
    addMsg(child, "me", "📷 [שלחתי תמונה לבדיקה]");
  } else {
    addMsg(child, "me", text);
  }

  state.typing = true;
  state.lastError = null;
  render();

  try {
    const aiText = await sendToAI(child, text, imageB64);
    state.typing = false;
    handleAIResponse(child, aiText);
  } catch(e){
    state.typing = false;
    state.lastError = "שגיאה בחיבור לשרת. בדקי שוב.";
    render();
  }
}

function nextLesson(child){
  const c = state[child];
  const lessons = child==="liran" ? LIRAN_LESSONS : ADEL_LESSONS;
  c.lessonIdx = (c.lessonIdx+1) % lessons.length;
  save(`${child}_idx`, c.lessonIdx);
  c.hw = null;
  c.hwText = "";
  startLesson(child);
}

// ═══════════════════════════════════════════
//  VOICE INPUT (Speech Recognition)
// ═══════════════════════════════════════════
function startListening(child){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("נסי Google Chrome! 🎤"); return; }
  stopAudio();
  recognizer = new SR();
  recognizer.lang = "he-IL";
  recognizer.continuous = false;
  recognizer.interimResults = false;
  recognizer.onstart  = ()=>{ state.listening=true; render(); };
  recognizer.onresult = e=>{ const t=e.results[0][0].transcript; stopListening(); sendMessage(child,t); };
  recognizer.onerror  = ()=>stopListening();
  recognizer.onend    = ()=>{ if(state.listening)stopListening(); };
  recognizer.start();
}
function stopListening(){
  if(recognizer){ try{recognizer.stop();}catch{} recognizer=null; }
  state.listening = false;
  render();
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════
async function openCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    state.cameraStream = stream;
    render();
    setTimeout(()=>{
      const v = document.getElementById("camVideo");
      if(v) v.srcObject = stream;
    },50);
  } catch { alert("לא ניתן לפתוח מצלמה. אפשר להעלות תמונה מהגלריה."); }
}
function capturePhoto(){
  const v = document.getElementById("camVideo");
  if(!v) return;
  const c = document.createElement("canvas");
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext("2d").drawImage(v,0,0);
  state.captureImg = c.toDataURL("image/jpeg",.85);
  closeCamera();
  render();
}
function closeCamera(){
  if(state.cameraStream){ state.cameraStream.getTracks().forEach(t=>t.stop()); state.cameraStream=null; }
  render();
}
function handleFileUpload(e, child){
  const file = e.target.files[0];
  if(!file) return;
  const fr = new FileReader();
  fr.onload = ev => { state.captureImg = ev.target.result; render(); };
  fr.readAsDataURL(file);
}
function sendImage(child){
  if(!state.captureImg) return;
  const b64 = state.captureImg.split(",")[1];
  const img = state.captureImg;
  state.captureImg = null;
  sendMessage(child, "תבדקי את העבודה שלי!", b64);
}

//  NAVIGATE
// ═══════════════════════════════════════════
function openChild(child){
  state.child  = child;
  state.screen = child;
  state.shabbatOverride = false;
  state.lastError = null;
  render();
  if(!isShabbat() && !isFridayPM() || state.shabbatOverride){
    if(state[child].messages.length===0) startLesson(child);
  }
}
function goHome(){
  stopAudio(); stopListening(); closeCamera();
  state.screen="home"; state.child=null;
  render();
}
function openParent(){ state.screen="parent"; render(); }

function render(){
  const root = document.getElementById("app");
  if(!root) return;

  const s = state.screen;
  if(s==="home")   root.innerHTML = renderHome();
  else if(s==="liran") root.innerHTML = renderChild("liran");
  else if(s==="adel")  root.innerHTML = renderChild("adel");
  else if(s==="parent") root.innerHTML = renderParent();

  attachEvents();
}

      </div>`:""}`;
  }
  else if(tab==="notes"){
    const addNote = (child,label) => {
      const inputId = `noteIn_${child}`;
      const notes = state[child].notes;
      return `<div class="card" style="margin-bottom:.75rem">
        <div class="card-label">${label}</div>
        <textarea class="note-in" id="${inputId}" rows="2" placeholder="הנחיה למורה (למשל: לירן מתקשה בחשבון)"></textarea>
        <button class="note-add" onclick="addNote('${child}','${inputId}')">+ הוסף הנחיה</button>
        <div style="margin-top:.5rem">${notes.slice(-5).reverse().map((n,i)=>`<div class="note-item"><span>${n}</span><button class="note-del" onclick="delNote('${child}',${notes.length-1-i})">✕</button></div>`).join("")}</div>
      </div>`;
    };
    content = addNote("liran","📝 הנחיות ללירן") + addNote("adel","📝 הנחיות לאדל");
  }
  else {
    const allEvents = [
      ...li.memory.map(m=>({...m,who:"לירן"})),
      ...ad.memory.map(m=>({...m,who:"אדל"}))
    ].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
    content = allEvents.length
      ? allEvents.map(e=>`<div class="note-item"><span>${e.date} — ${e.who}: ${e.lesson}</span></div>`).join("")
      : `<p style="text-align:center;color:#9490A8;padding:2rem">אין עדיין שיעורים מוקלטים</p>`;
  }

  return `<div class="app">
    ${renderTopbar("👨‍👩‍👧 הורים")}
    <div class="screen">
      <div class="tabs">${tabs}</div>
      ${content}
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="openParent()">👨‍👩‍👧 הורים</button>
      <button class="nav-btn" onclick="openChild('adel')">אדל</button>
      <button class="nav-btn" onclick="openChild('liran')">לירן</button>
      <button class="nav-btn" onclick="goHome()">🏠 בית</button>
    </nav>
  </div>`;
}

function addNote(child, inputId){
  const val = document.getElementById(inputId)?.value?.trim();
  if(!val) return;
  state[child].notes.push(val);
  save(`${child}_notes`, state[child].notes);
  render();
}
function delNote(child, idx){
  state[child].notes.splice(idx,1);
  save(`${child}_notes`, state[child].notes);
  render();
}

function sendFromInput(child){
  const el = document.getElementById("textIn");
  if(!el) return;
  const val = el.value.trim();
  if(!val) return;
  el.value = "";
  sendMessage(child, val);
}

function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function attachEvents(){
  // Auto-scroll chat
  const chatEl = document.getElementById("chatArea");
  if(chatEl) chatEl.scrollTop = chatEl.scrollHeight;

  // Attach camera stream if open
  const v = document.getElementById("camVideo");
  if(v && state.cameraStream) v.srcObject = state.cameraStream;
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
